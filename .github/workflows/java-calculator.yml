name: Test Calculadora

on:
  push:
    branches: [ main, master, feature/* ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-calculadora:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
  
      - name: Java Configuration
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
  
      - name: Tests Execution
        run: mvn -B test
        
      - name: Installing pandoc and LaTex
        if: always()
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils pandoc texlive-latex-base texlive-latex-recommended texlive-latex-extra

      - name: Write reports
        if: always()
        run: |
          REPORT="tests-report.md"
          echo "# Informe detallado de tests" > $REPORT
          echo "" >> $REPORT
          echo "- Estado general del job: **${{ job.status }}**" >> $REPORT
          echo "- Fecha: $(date)" >> $REPORT
          echo "" >> $REPORT
          
          echo "## Resultados por test" >> $REPORT
          echo "" >> $REPORT
          
          for FILE in target/surefire-reports/*.xml; do
            echo "Procesando $FILE ..."
            CLASSNAME=$(xmllint --xpath "string(/testsuite/@name)" "$FILE" 2>/dev/null)
            
            echo "### Clase: \`$CLASSNAME\`" >> $REPORT
            echo "" >> $REPORT
            
            # Iterar por cada test case
            TESTCOUNT=$(xmllint --xpath "count(/testsuite/testcase)" "$FILE" 2>/dev/null)
            
            for (( i=1; i<=$TESTCOUNT; i++ ))
            do
              NAME=$(xmllint --xpath "string(/testsuite/testcase[$i]/@name)" "$FILE")
              
              # Detectar fallo
              FAILMSG=$(xmllint --xpath "string(/testsuite/testcase[$i]/failure/@message)" "$FILE" 2>/dev/null || true)
              FAILTEXT=$(xmllint --xpath "string(/testsuite/testcase[$i]/failure)" "$FILE" 2>/dev/null || true)
              
              echo "- **Test:** \`$NAME\`" >> $REPORT
              
              if [[ -n "$FAILMSG" ]]; then
                echo "  - Estado: **Falló**" >> $REPORT
                echo "  - Mensaje: $FAILMSG" >> $REPORT
                echo "  - Stacktrace:" >> $REPORT
                echo '```' >> $REPORT
                echo "$FAILTEXT" >> $REPORT
                echo '```' >> $REPORT
              else
                echo "  - Estado: **OK**" >> $REPORT
              fi
              
              echo "" >> $REPORT
            done
            
            echo "" >> $REPORT
          done
  
      - name: Generate PDF from Markdown
        if: always()
        run: |
          pandoc tests-report.md -o tests-report.pdf --pdf-engine=pdflatex
  
      - name: Upload PDF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tests-report-pdf
          path: tests-report.pdf
